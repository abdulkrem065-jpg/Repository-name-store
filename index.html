<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر الذيباني</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

  <!-- خط -->
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Tajawal', sans-serif;
      background: #f8fafc;
    }

    .product-card {
      background: white;
      border-radius: 16px;
      transition: 0.3s;
    }

    .product-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    #sliderImg {
      transition: opacity 0.5s ease;
    }
  </style>
</head>

<body>

<!-- الهيدر -->
<header class="bg-white shadow p-3 flex justify-between items-center">
  <h1 class="font-bold text-xl text-blue-600">متجر الذيباني</h1>

  <div onclick="toggleCart()" class="relative cursor-pointer">
    <i class="fas fa-shopping-cart text-2xl text-blue-600"></i>
    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-500 text-white text-xs px-2 rounded-full">0</span>
  </div>
</header>

<!-- السلايدر -->
<section class="m-4 rounded-xl overflow-hidden">
  <img id="sliderImg" src="ad1.jpg" class="w-full h-48 object-cover">
</section>

<!-- البحث -->
<div class="p-4">
  <div class="flex gap-2">
    <input id="search" type="text" placeholder="ابحث عن منتج..."
      class="flex-1 p-3 border rounded-xl">

    <button onclick="search()" class="bg-blue-600 text-white px-5 rounded-xl">
      بحث
    </button>
  </div>
</div>

<!-- المنتجات -->
<main class="p-4">
  <div id="products" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
</main>

<!-- السلة -->
<div id="cart-drawer" class="fixed inset-0 bg-black/50 hidden" onclick="toggleCart()">
  <div class="bg-white w-80 h-full p-4" onclick="event.stopPropagation()">

    <h2 class="text-xl font-bold mb-4">السلة</h2>

    <div id="cart-items-container" class="space-y-3"></div>

    <div id="cart-footer" class="mt-4"></div>

    <button onclick="toggleCart()" class="mt-4 text-red-500">
      إغلاق
    </button>

  </div>
</div>

<!-- JS -->
<script src="app.js"></script>

<script>
  function toggleCart() {
    document.getElementById("cart-drawer").classList.toggle("hidden");
  }
</script>

</body>
</html>
